name: Pokemon TCG News

on:
  schedule:
    # 00:30 UTC = 08:30 Asia/Taipei
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  run-news-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Taipei
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run news crawler and send Telegram message
        run: python pokemon_news_tool.py --telegram

      - name: Upload generated reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pokemon-tcg-news-report
          path: outputs/*
          if-no-files-found: ignore
          retention-days: 14
